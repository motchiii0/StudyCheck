<!DOCTYPE html>

<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MineStudy</title>
  <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Mochiy+Pop+One&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-G5RBGGP46B"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-G5RBGGP46B');
</script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="hdr">
    <h1 class="logo">Mine<span>Study</span></h1>
    <button class="cfg-btn" id="settingsBtn">⚙️ 設定</button>
  </header>

  <div class="wrap">


<div class="fbar" id="filterBar"></div>

<div class="iform">
  <input class="itxt" id="todoInput" placeholder="やること">
  <input class="iamt" id="amountInput" placeholder="分量">
  <select class="isel" id="subjectSelect"></select>
  <button class="addbtn" id="addBtn">＋ 追加</button>
</div>

<div class="tlist" id="todoList"></div>

<div class="bzone" id="bulkZone" style="display:none;">
  <button class="bdelbtn" id="bulkDelBtn">🗑️ すべて削除</button>
</div>


  </div>

  <div class="overlay" id="settingsModal" style="display:none;">
    <div class="mbox">
      <div class="mtitle">⚙️ 科目の設定</div>
      <div id="subjectSettings"></div>
      <div class="mfoot">
        <button class="cbtn" id="settingsCancel">キャンセル</button>
        <button class="sbtn" id="settingsSave">保存</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="bulkModal" style="display:none;">
    <div class="mbox">
      <div class="mtitle">🗑️ すべて削除</div>
      <p class="mdesc">この操作は取り消せません。<br>「<strong>削除</strong>」と入力してください。</p>
      <input class="cinput" id="confirmInput" placeholder="削除">
      <div class="mfoot">
        <button class="cbtn" id="bulkCancel">キャンセル</button>
        <button class="dbtn" id="bulkConfirm" disabled>削除する</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="rowDelModal" style="display:none;">
    <div class="mbox">
      <div class="mtitle">タスクを削除しますか？</div>
      <p class="mdesc" id="rowDelDesc"></p>
      <div class="mfoot">
        <button class="cbtn" id="rowDelCancel">いいえ</button>
        <button class="dbtn" id="rowDelConfirm">はい</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>

</body>
</html>
